<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Bubble & Bounce</title>
<style>
:root{
  --bl:#1a6eb5;--bl2:#145a96;--bl-light:#e8f2fb;--bl-mid:#7db8e8;
  --navy:#0f2a4a;--sky:#e0f0ff;
  --green:#16a34a;--green-light:#dcfce7;
  --red:#dc2626;--red-light:#fee2e2;
  --yellow:#d97706;--yellow-light:#fef9c4;
  --gray:#6b7280;--gray-light:#f3f4f6;--gray-mid:#e5e7eb;
  --dark:#111827;--white:#ffffff;
  --radius:12px;--shadow:0 2px 12px rgba(0,0,0,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f6ff;color:var(--dark);min-height:100vh;}
.nav{background:var(--navy);padding:10px 0 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
.nav-title{color:var(--bl-mid);font-weight:900;font-size:17px;text-align:center;padding:0 0 2px;letter-spacing:1px;}
.nav-title span{color:#fff;}
.nav-sub{text-align:center;font-size:10px;color:#6b8fab;padding-bottom:8px;}
.nav-tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-top:1px solid #ffffff18;}
.nav-tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:60px;padding:10px 4px 8px;text-align:center;font-size:11px;font-weight:600;color:#9ca3af;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
.tab.active{color:var(--bl-mid);border-bottom-color:var(--bl-mid);}
.page{display:none;padding:14px;max-width:600px;margin:0 auto;}
.page.active{display:block;}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:8px;border:none;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.15s;}
.btn-bl{background:var(--bl);color:#fff;}
.btn-bl:active{background:var(--bl2);}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px;}
.btn-ghost{background:var(--gray-light);color:var(--dark);}
.btn-red{background:var(--red-light);color:var(--red);}
.btn-green{background:var(--green-light);color:var(--green);border:1.5px solid #16a34a40;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-available{background:var(--green-light);color:var(--green);}
.badge-pending{background:var(--yellow-light);color:var(--yellow);}
.badge-confirmed{background:var(--bl-light);color:var(--bl);}
.badge-out{background:#f3e8ff;color:#7c3aed;}
.badge-cancelled{background:var(--red-light);color:var(--red);}
.form-group{margin-bottom:12px;}
label{display:block;font-size:12px;font-weight:700;color:var(--gray);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
input,select,textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-mid);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:var(--dark);outline:none;transition:border 0.15s;}
input:focus,select:focus,textarea:focus{border-color:var(--bl);}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:flex-end;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:18px 18px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:18px 16px 32px;}
.modal-title{font-weight:900;font-size:18px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;text-align:center;}
.stat-num{font-size:28px;font-weight:900;color:var(--bl);}
.stat-label{font-size:11px;color:var(--gray);font-weight:600;margin-top:2px;}
.book-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:12px;margin-bottom:10px;border-left:4px solid var(--gray-mid);}
.book-card.confirmed{border-left-color:var(--bl);}
.book-card.pending{border-left-color:var(--yellow);}
.book-card.out{border-left-color:#7c3aed;}
.book-card.cancelled{border-left-color:var(--red);}
.book-card.available{border-left-color:var(--green);}
.book-name{font-weight:800;font-size:15px;}
.book-meta{font-size:12px;color:var(--gray);margin-top:3px;}
.book-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day-hdr{text-align:center;font-size:10px;font-weight:700;color:var(--gray);padding:4px 0;}
.cal-day{min-height:38px;border-radius:8px;padding:4px;cursor:pointer;background:#fff;border:1.5px solid transparent;}
.cal-day:hover{border-color:var(--bl-mid);}
.cal-day.today{border-color:var(--bl);background:var(--bl-light);}
.cal-day.has-booking{background:var(--bl-light);}
.cal-day-num{font-size:12px;font-weight:700;}
.cal-dot{width:6px;height:6px;border-radius:50%;background:var(--bl);display:inline-block;margin:1px;}
.cal-empty{min-height:38px;}
.acc-check{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--gray-light);border-radius:8px;margin-bottom:6px;font-size:13px;}
.acc-check input[type=checkbox]{width:18px;height:18px;accent-color:var(--bl);cursor:pointer;}
.upcoming-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-mid);}
.upcoming-item:last-child{border-bottom:none;}
.upcoming-date{background:var(--bl);color:#fff;border-radius:8px;padding:6px 8px;text-align:center;min-width:44px;}
.upcoming-date-day{font-size:18px;font-weight:900;line-height:1;}
.upcoming-date-mo{font-size:10px;font-weight:700;}
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap input{padding-left:36px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gray);}
.company-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-left:6px;}
.company-carmen{background:#fff0eb;color:#e8530a;}
.company-thomas{background:var(--bl-light);color:var(--bl);}
.company-sidney{background:#f3e8ff;color:#7c3aed;}
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(135deg,var(--navy) 0%,var(--bl) 100%);}
.login-card{background:#fff;border-radius:18px;padding:28px 22px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.25);}
.powered-by{text-align:center;padding:16px 0 4px;font-size:11px;color:var(--gray);}
.powered-by span{color:var(--bl);font-weight:700;}
.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:4px;}
.sync-dot.syncing{background:var(--yellow);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
</style>
</head>

<script>

async function tursoQuery(sql,args=[]){
  const typedArgs=args.map(v=>{
    if(v===null||v===undefined) return{type:'null'};
    if(typeof v==='number') return Number.isInteger(v)?{type:'integer',value:String(v)}:{type:'float',value:String(v)};
    return{type:'text',value:String(v)};
  });
  const res=await fetch(TURSO_URL+'/v2/pipeline',{
    method:'POST',
    headers:{'Authorization':'Bearer '+TURSO_TOKEN,'Content-Type':'application/json'},
    body:JSON.stringify({requests:[{type:'execute',stmt:{sql,args:typedArgs}},{type:'close'}]})
  });
  if(!res.ok) throw new Error('Turso HTTP '+res.status);
  const json=await res.json();
  if(json.results[0].type==='error') throw new Error(json.results[0].error.message);
  const result=json.results[0].response.result;
  const cols=result.cols.map(c=>c.name);
  const rows=result.rows.map(row=>{
    const obj={};
    cols.forEach((col,i)=>{
      const cell=row[i];
      let val=(cell&&cell.type!=='null')?cell.value:null;
      if(cell&&(cell.type==='integer'||cell.type==='float')&&val!==null) val=Number(val);
      if(col==='accessories'&&val){try{val=JSON.parse(val);}catch(e){}}
      obj[col]=val;
    });
    return obj;
  });
  return{rows,lastInsertRowid:result.last_insert_rowid?Number(result.last_insert_rowid):null,affectedRowCount:result.affected_row_count||0};
}

// ── PINS ──────────────────────────────────────────────────────────────────────
const PINS = { Carmen:"1234", Thomas:"1234", Sidney:"1234" };

// products loaded from Turso bb_products table
let products = [];

let currentUser = null;
let bookings = [];
let editId = null;
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

// ── AUTH ──────────────────────────────────────────────────────────────────────
function doLogin(){
  const user = document.getElementById("login-user").value;
  const pin  = document.getElementById("login-pin").value;
  if(!user){ alert("Please select your name."); return; }
  if(PINS[user] !== pin){
    document.getElementById("login-err").style.display="block";
    document.getElementById("login-pin").value="";
    return;
  }
  currentUser = user;
  document.getElementById("login-err").style.display="none";
  document.getElementById("login-screen").style.display="none";
  document.getElementById("main-app").style.display="block";
  document.getElementById("logged-in-as").textContent = user;
  document.getElementById("f-bookedby").value = user;
  loadProducts();
  loadBookings();
}
function doLogout(){
  currentUser=null;
  document.getElementById("main-app").style.display="none";
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("login-pin").value="";

}
document.getElementById("login-pin").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});

// ── TURSO ─────────────────────────────────────────────────────────────────────
function setSyncing(on){
  const dot=document.getElementById("sync-dot");
  if(on) dot.classList.add("syncing"); else dot.classList.remove("syncing");
}

async function loadProducts(){
  try{
    const{rows}=await tursoQuery("SELECT * FROM bb_products WHERE status='active' ORDER BY category,name ASC");
    products=rows;
    populateItemSelect();
    renderStock();
    renderDashboard();
  }catch(e){console.error("loadProducts:",e);}
}

function populateItemSelect(){
  const sel=document.getElementById("f-item");
  if(!sel) return;
  const current=sel.value;
  const catGroups={
    "Bubble House":{emoji:"🫧",label:"Bubbles",items:[]},
    "Jumping Castle":{emoji:"🏰",label:"Castles",items:[]},
    "Water Slide":{emoji:"💧",label:"Water Slides",items:[]},
    "Combo":{emoji:"🎪",label:"Combos",items:[]},
    "Other":{emoji:"🧸",label:"Other",items:[]},
  };
  products.forEach(p=>{
    const grp=catGroups[p.category]||catGroups["Other"];
    grp.items.push(p);
  });
  let html='<option value="">Select item...</option>';
  Object.values(catGroups).forEach(grp=>{
    if(!grp.items.length) return;
    html+=`<optgroup label="${grp.emoji} ${grp.label}">`;
    grp.items.forEach(p=>{html+=`<option value="${p.name}">${p.name}</option>`;});
    html+='</optgroup>';
  });
  sel.innerHTML=html;
  if(current) sel.value=current;
}

async function loadBookings(){
  setSyncing(true);
  try{
    const{rows}=await tursoQuery("SELECT * FROM bb_bookings ORDER BY date ASC");
    bookings=rows;
  }catch(e){console.error(e);}
  setSyncing(false);
  renderAll();
}

async function upsertBooking(bk){
  setSyncing(true);
  try{
    const isEdit=bk.id&&typeof bk.id==="number"&&bk.id<1000000000000;
    if(isEdit){
      await tursoQuery(
        "UPDATE bb_bookings SET booked_by=?,item=?,accessories=?,date=?,edate=?,status=?,notes=? WHERE id=?",
        [bk.booked_by,bk.item,JSON.stringify(bk.accessories||[]),bk.date||null,bk.edate||null,bk.status,bk.notes||null,bk.id]
      );
    }else{
      const{rows}=await tursoQuery(
        "INSERT INTO bb_bookings (booked_by,item,accessories,date,edate,status,notes) VALUES (?,?,?,?,?,?,?) RETURNING id",
        [bk.booked_by,bk.item,JSON.stringify(bk.accessories||[]),bk.date||null,bk.edate||null,bk.status,bk.notes||null]
      );
      if(rows[0]) bk.id=Number(rows[0].id);
    }
  }catch(e){console.error(e);}
  setSyncing(false);
}

async function deleteBooking(id){
  setSyncing(true);
  try{await tursoQuery("DELETE FROM bb_bookings WHERE id=?",[id]);}catch(e){console.error(e);}
  setSyncing(false);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function pad(n){return String(n).padStart(2,"0");}
function today(){const d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function formatDate(s){if(!s)return"";const d=new Date(s);return d.toLocaleDateString("en-ZA",{day:"numeric",month:"short",year:"numeric"});}
function companyTag(user){return`<span class="company-tag company-${user.toLowerCase()}">${user}</span>`;}
function statusBadge(s){
  const map={confirmed:"✅ Confirmed",pending:"⏳ Pending",out:"🚚 Out on Hire",cancelled:"❌ Cancelled"};
  return`<span class="badge badge-${s}">${map[s]||s}</span>`;
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function showTab(t){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(tb=>tb.classList.remove("active"));
  document.getElementById("page-"+t).classList.add("active");
  const tabs=["dashboard","calendar","bookings","stock"];
  document.querySelectorAll(".tab")[tabs.indexOf(t)].classList.add("active");
  if(t==="dashboard") renderDashboard();
  if(t==="calendar")  renderCalendar();
  if(t==="bookings")  renderBookings();
  if(t==="stock")     renderStock();
}

function renderAll(){renderDashboard();renderCalendar();renderBookings();renderStock();}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard(){
  const td=today();
  document.getElementById("s-confirmed").textContent=bookings.filter(b=>b.status==="confirmed").length;
  document.getElementById("s-pending").textContent=bookings.filter(b=>b.status==="pending").length;

  // Items booked today
  const bookedToday=new Set(bookings.filter(b=>b.status!=="cancelled"&&b.date&&b.date<=td&&(b.edate||b.date)>=td).map(b=>b.item));
  document.getElementById("s-avail").textContent=products.length-bookedToday.size;
  document.getElementById("s-out").textContent=bookings.filter(b=>b.status==="out").length;

  const upcoming=bookings.filter(b=>b.date&&b.date>=td&&b.status!=="cancelled")
    .sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);
  const ul=document.getElementById("upcoming-list");
  if(!upcoming.length){ul.innerHTML='<div style="color:var(--gray);font-size:13px;">No upcoming bookings</div>';return;}
  ul.innerHTML=upcoming.map(b=>{
    const d=new Date(b.date);
    return`<div class="upcoming-item">
      <div class="upcoming-date"><div class="upcoming-date-day">${d.getDate()}</div><div class="upcoming-date-mo">${d.toLocaleString("en",{month:"short"}).toUpperCase()}</div></div>
      <div style="flex:1;">
        <div style="font-weight:700;font-size:13px;">${b.item||"?"}${companyTag(b.booked_by||"")}</div>
        <div style="font-size:12px;color:var(--gray);">${b.accessories&&b.accessories.length?b.accessories.join(", "):""}</div>
        ${b.notes?`<div style="font-size:11px;color:var(--gray);">📝 ${b.notes}</div>`:""}
      </div>
      ${statusBadge(b.status)}
    </div>`;
  }).join("");
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function renderCalendar(){
  const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
  document.getElementById("cal-title").textContent=months[calMonth]+" "+calYear;
  document.getElementById("cal-headers").innerHTML=["M","T","W","T","F","S","S"].map(d=>`<div class="cal-day-hdr">${d}</div>`).join("");
  const first=new Date(calYear,calMonth,1).getDay();
  const offset=(first===0?6:first-1);
  const days=new Date(calYear,calMonth+1,0).getDate();
  const td=today();
  let html="";
  for(let i=0;i<offset;i++) html+='<div class="cal-empty"></div>';
  for(let d=1;d<=days;d++){
    const ds=calYear+"-"+pad(calMonth+1)+"-"+pad(d);
    const dayBooks=bookings.filter(b=>b.date&&b.date<=ds&&(b.edate||b.date)>=ds&&b.status!=="cancelled");
    html+=`<div class="cal-day ${ds===td?"today":""} ${dayBooks.length?"has-booking":""}" onclick="showDay('${ds}')">
      <div class="cal-day-num">${d}</div>
      ${dayBooks.slice(0,3).map(()=>'<span class="cal-dot"></span>').join("")}
    </div>`;
  }
  document.getElementById("cal-body").innerHTML=html;
}
function calNav(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}

function showDay(ds){
  const dayBooks=bookings.filter(b=>b.date&&b.date<=ds&&(b.edate||b.date)>=ds&&b.status!=="cancelled");
  const d=new Date(ds);
  document.getElementById("modal-day-title").textContent=d.toLocaleDateString("en-ZA",{weekday:"long",day:"numeric",month:"long"});
  document.getElementById("modal-day-content").innerHTML=dayBooks.length?dayBooks.map(b=>`
    <div class="book-card ${b.status}" style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;">
        <div class="book-name">${b.item||"?"}${companyTag(b.booked_by||"")}</div>
        ${statusBadge(b.status)}
      </div>
      ${b.accessories&&b.accessories.length?`<div class="book-meta">⚙️ ${b.accessories.join(", ")}</div>`:""}
      ${b.notes?`<div class="book-meta">📝 ${b.notes}</div>`:""}
      <div class="book-actions">
        <button class="btn btn-ghost btn-sm" onclick="closeDay();openBook(${b.id})">✏️ Edit</button>
        <button class="btn btn-red btn-sm" onclick="closeDay();delBook(${b.id})">🗑️</button>
      </div>
    </div>`).join(""):'<div style="color:var(--gray);font-size:13px;padding:10px 0;">Nothing booked on this day</div>';
  document.getElementById("modal-day").classList.add("open");
}
function closeDay(){document.getElementById("modal-day").classList.remove("open");}

// ── BOOKINGS ──────────────────────────────────────────────────────────────────
function renderBookings(q=""){
  const list=document.getElementById("book-list");
  let filtered=bookings.filter(b=>{
    if(!q)return true;
    const s=q.toLowerCase();
    return(b.item||"").toLowerCase().includes(s)||(b.booked_by||"").toLowerCase().includes(s)||(b.date||"").includes(s)||(b.notes||"").toLowerCase().includes(s);
  }).sort((a,b)=>(b.date||"").localeCompare(a.date||""));

  if(!filtered.length){list.innerHTML='<div class="card" style="color:var(--gray);text-align:center;padding:24px;">No bookings yet — tap + New to add one!</div>';return;}
  list.innerHTML=filtered.map(b=>`
    <div class="book-card ${b.status}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div class="book-name">${b.item||"?"}${companyTag(b.booked_by||"")}</div>
        ${statusBadge(b.status)}
      </div>
      <div class="book-meta">📅 ${formatDate(b.date)}${b.edate&&b.edate!==b.date?" → "+formatDate(b.edate):""}</div>
      ${b.accessories&&b.accessories.length?`<div class="book-meta">⚙️ ${b.accessories.join(", ")}</div>`:""}
      ${b.notes?`<div class="book-meta">📝 ${b.notes}</div>`:""}
      <div class="book-actions">
        ${b.status!=="confirmed"?`<button class="btn btn-green btn-sm" onclick="quickStatus(${b.id},'confirmed')">✅ Confirm</button>`:""}
        ${b.status!=="out"?`<button class="btn btn-sm" style="background:#f3e8ff;color:#7c3aed;" onclick="quickStatus(${b.id},'out')">🚚 Out</button>`:""}
        <button class="btn btn-ghost btn-sm" onclick="openBook(${b.id})">✏️ Edit</button>
        <button class="btn btn-red btn-sm" onclick="delBook(${b.id})">🗑️</button>
      </div>
    </div>`).join("");
}

async function quickStatus(id,s){
  const b=bookings.find(x=>x.id===id);
  if(!b)return;
  b.status=s;
  renderAll();
  await upsertBooking(b);
}

async function delBook(id){
  if(!confirm("Delete this booking?"))return;
  bookings=bookings.filter(b=>b.id!==id);
  renderAll();
  await deleteBooking(id);
}

// ── STOCK OVERVIEW ────────────────────────────────────────────────────────────
function renderStock(){
  const td=today();
  if(!products.length){
    document.getElementById("stock-list").innerHTML='<div class="card" style="color:var(--gray);text-align:center;padding:24px;">Loading stock…</div>';
    return;
  }
  const catOrder=["Bubble House","Jumping Castle","Water Slide","Combo","Other"];
  const catLabel={"Bubble House":"🫧 Bubbles","Jumping Castle":"🏰 Castles","Water Slide":"💧 Water Slides","Combo":"🎪 Combos","Other":"🧸 Other"};
  const cats={};
  products.forEach(p=>{
    const cat=p.category||"Other";
    if(!cats[cat]) cats[cat]=[];
    const activeBooking=bookings.find(b=>b.item===p.name&&b.status!=="cancelled"&&b.date&&b.date<=td&&(b.edate||b.date)>=td);
    const upcomingBooking=bookings.find(b=>b.item===p.name&&b.status!=="cancelled"&&b.date&&b.date>td);
    cats[cat].push({...p, activeBooking, upcomingBooking});
  });
  let html="";
  catOrder.forEach(cat=>{
    if(!cats[cat]||!cats[cat].length) return;
    html+=`<div class="card">
      <div style="font-weight:800;font-size:14px;margin-bottom:10px;color:var(--bl);">${catLabel[cat]||cat}</div>`;
    cats[cat].forEach(i=>{
      const booked=!!i.activeBooking;
      const upcoming=!!i.upcomingBooking;
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--gray-mid);">
        <div>
          <div style="font-weight:600;font-size:13px;">${i.name}</div>
          ${i.price_full_day?`<div style="font-size:11px;color:var(--gray);">R${i.price_full_day.toLocaleString("en-ZA")} / day</div>`:""}
          ${booked?`<div style="font-size:11px;color:#7c3aed;">🚚 Out — ${i.activeBooking.booked_by} · ${formatDate(i.activeBooking.date)}</div>`:""}
          ${!booked&&upcoming?`<div style="font-size:11px;color:var(--yellow);">⏳ Booked — ${i.upcomingBooking.booked_by} · ${formatDate(i.upcomingBooking.date)}</div>`:""}
        </div>
        <span class="badge ${booked?"badge-out":upcoming?"badge-pending":"badge-available"}">${booked?"🚚 Out":upcoming?"⏳ Booked":"✅ Free"}</span>
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById("stock-list").innerHTML=html;
}

// ── BOOKING MODAL ─────────────────────────────────────────────────────────────
function onItemChange(){
  const item=document.getElementById("f-item").value;
  const prod=products.find(p=>p.name===item);
  let accs=prod&&prod.accessories?prod.accessories:[];
  if(typeof accs==="string"){try{accs=JSON.parse(accs);}catch(e){accs=accs.split(",").map(s=>s.trim()).filter(Boolean);}}
  const section=document.getElementById("acc-section");
  const list=document.getElementById("acc-list");
  if(!accs.length){section.style.display="none";return;}
  section.style.display="block";
  list.innerHTML=accs.map(a=>`
    <div class="acc-check">
      <input type="checkbox" id="acc-${a.replace(/\s/g,'-')}" value="${a}" checked>
      <label for="acc-${a.replace(/\s/g,'-')}" style="text-transform:none;font-size:13px;color:var(--dark);letter-spacing:0;margin:0;cursor:pointer;">${a}</label>
    </div>`).join("");
}

function openBook(id=null){
  editId=id;
  const b=id?bookings.find(x=>x.id===id):null;
  document.getElementById("modal-book-title").textContent=id?"Edit Booking":"New Booking";
  document.getElementById("f-bookedby").value=b?b.booked_by||currentUser:currentUser;
  document.getElementById("f-item").value=b?b.item||"":"";
  document.getElementById("f-date").value=b?b.date||"":today();
  document.getElementById("f-edate").value=b?b.edate||"":"";
  document.getElementById("f-status").value=b?b.status||"pending":"pending";
  document.getElementById("f-notes").value=b?b.notes||"":"";

  // Restore accessories
  if(b&&b.item){
    onItemChange();
    if(b.accessories&&b.accessories.length){
      // Uncheck anything not in saved list
      document.querySelectorAll("#acc-list input[type=checkbox]").forEach(cb=>{
        cb.checked=b.accessories.includes(cb.value);
      });
    }
  } else {
    document.getElementById("acc-section").style.display="none";
    document.getElementById("acc-list").innerHTML="";
  }

  document.getElementById("modal-book").classList.add("open");
}

async function saveBook(){
  const item=document.getElementById("f-item").value;
  if(!item){alert("Please select an item.");return;}
  const accessories=[...document.querySelectorAll("#acc-list input[type=checkbox]:checked")].map(cb=>cb.value);

  const bk={
    booked_by: document.getElementById("f-bookedby").value,
    item,
    accessories,
    date:   document.getElementById("f-date").value,
    edate:  document.getElementById("f-edate").value,
    status: document.getElementById("f-status").value,
    notes:  document.getElementById("f-notes").value.trim(),
  };

  if(editId){
    bk.id=editId;
    bookings=bookings.map(b=>b.id===editId?bk:b);
  } else {
    bk.id=Date.now(); // temp id until Supabase assigns one
    bookings.push(bk);
  }

  closeBook();
  renderAll();
  await upsertBooking(bk);
  // Reload to get proper Supabase ID
  await loadBookings();
}

function closeBook(){document.getElementById("modal-book").classList.remove("open");editId=null;}
</script>
